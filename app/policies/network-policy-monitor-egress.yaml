apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitor-egress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: team-monitor
  policyTypes:
  - Egress
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 443
  - to:
    - podSelector:
        matchLabels:
          app: api
    ports:
    - port: 3000
